<style>
:root {
  --bg: #f4f1eb; --bg-deep: #e8e3da; --fg: #1c1a17; --fg-2: #5a554d;
  --fg-3: #908a80; --accent: #d4854a; --accent-deep: #b86830;
  --mango: #e8a44a; --mango-glow: #f5c96b; --border: #d6d0c6;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--fg); font-family: var(--sans); overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── GRAIN ── */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── MANGO STRIP ── */
.mango-strip {
  position: fixed; top: 12px; left: 8px; z-index: 101;
  display: flex; flex-direction: column;
}
.mango-strip span {
  display: block; width: 8px; height: 8px; margin-top: -1px;
}
.mango-strip span:first-child { margin-top: 0; }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: flex-start; align-items: center; padding: 22px 40px;
  gap: 28px;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.nav.scrolled {
  padding: 14px 40px; background: rgba(244,241,235,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(214,208,198,0.5);
}
.nav-logo {
  font-family: var(--mono); font-size: 10px; font-weight: 400;
  letter-spacing: 3.5px; text-transform: uppercase; color: var(--fg);
  cursor: pointer; background: none; border: none; transition: color 0.3s;
  margin-right: auto;
}
.nav-logo:hover { color: var(--accent); }
.nav-links { display: flex; gap: 24px; list-style: none; align-items: center; }
.nav-links li { display: flex; }
.nav-link {
  font-family: var(--sans); font-size: 11.5px; font-weight: 400;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--fg-2);
  cursor: pointer; transition: color 0.3s; position: relative; background: none; border: none; padding: 0;
}
.nav-link:hover { color: var(--fg); }
.nav-link.active { color: var(--accent-deep); }
.nav-link.active::after {
  content: ''; position: absolute; bottom: -6px; left: 0; right: 0;
  height: 1.5px; background: var(--accent-deep); border-radius: 1px;
}
.nav-vend {
  font-family: var(--mono); font-size: 10px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase; color: var(--mango);
  background: none; border: 1.5px solid var(--mango); padding: 6px 16px;
  cursor: pointer; transition: all 0.3s;
}
.nav-vend:hover {
  background: var(--mango); color: var(--fg);
  box-shadow: 0 0 20px rgba(232,164,74,0.25);
}

/* ── PAGES ── */
.page { display: none; opacity: 0; transform: translateY(12px); transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1), transform 0.5s cubic-bezier(0.22,1,0.36,1); }
.page.active { display: block; }
.page.entered { opacity: 1; transform: translateY(0); }

/* ── SHARED IMAGE ── */
.film-wrap { position: relative; overflow: hidden; border-radius: 2px; }
.film-wrap img { display: block; width: 100%; height: auto; }
.film-wrap .light-leak {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(135deg, rgba(232,164,74,0.07) 0%, transparent 40%, transparent 60%, rgba(184,104,48,0.05) 100%);
  mix-blend-mode: screen;
}
.film-wrap .img-grain {
  position: absolute; inset: 0; opacity: 0.06; mix-blend-mode: multiply; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px;
}

/* ── HOME ── */
.home { min-height: 100vh; padding: 120px 40px 80px; max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; }
.home-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--fg-3); margin-bottom: 40px; }
.home-label span { color: var(--accent); }
.home-title { font-family: var(--serif); font-size: clamp(36px, 6vw, 60px); font-weight: 400; font-style: italic; line-height: 1.08; color: var(--fg); margin-bottom: 14px; }
.home-byline { font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--fg-2); margin-bottom: 36px; }
.home-byline strong { font-weight: 500; color: var(--fg); }
.home-intro { font-family: var(--serif); font-size: 19px; line-height: 1.78; color: var(--fg); max-width: 620px; margin-bottom: 40px; }
.home-hero { margin-bottom: 12px; cursor: crosshair; }
.home-caption { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--fg-3); text-transform: lowercase; margin-bottom: 32px; }
.home-meta { display: flex; gap: 48px; padding-top: 28px; border-top: 1px solid var(--border); }
.meta-item { display: flex; flex-direction: column; gap: 5px; }
.meta-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-3); }
.meta-value { font-family: var(--sans); font-size: 14px; color: var(--fg); }
.enter-btn {
  display: inline-flex; align-items: center; gap: 14px; margin-top: 40px;
  background: none; border: none; font-family: var(--mono); font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent-deep);
  cursor: pointer; transition: gap 0.4s cubic-bezier(0.22,1,0.36,1);
}
.enter-btn:hover { gap: 24px; }
.enter-arrow { display: block; width: 36px; height: 1px; background: var(--accent-deep); position: relative; }
.enter-arrow::after { content: ''; position: absolute; right: 0; top: -3.5px; width: 8px; height: 8px; border-right: 1px solid var(--accent-deep); border-bottom: 1px solid var(--accent-deep); transform: rotate(-45deg); }

/* ── ROLL (single roll view) ── */
.edition { padding: 130px 0 80px; }
.edition-header { max-width: 620px; margin: 0 auto; padding: 0 40px 64px; }
.edition-num { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
.edition-title { font-family: var(--serif); font-size: clamp(32px, 5vw, 52px); font-weight: 400; font-style: italic; line-height: 1.12; color: var(--fg); margin-bottom: 10px; }
.edition-byline { font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--fg-2); margin-bottom: 40px; }
.edition-intro { font-family: var(--serif); font-size: 18px; line-height: 1.82; color: var(--fg); margin-bottom: 32px; }
.edition-imgs { display: flex; flex-direction: column; align-items: center; }
.edition-img-item {
  width: 100%; max-width: 880px; padding: 32px 40px 44px;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1);
}
.edition-img-item.vis { opacity: 1; transform: translateY(0); }
.edition-img-caption { font-family: var(--mono); font-size: 10px; letter-spacing: 1.2px; color: var(--fg-3); margin-top: 14px; text-align: center; text-transform: lowercase; }
.pq { max-width: 580px; margin: 24px auto 44px; padding: 40px; position: relative; }
.pq-mark { font-family: var(--serif); font-size: 88px; color: var(--mango); opacity: 0.2; line-height: 0.7; position: absolute; top: 12px; left: 16px; }
.pq-text { font-family: var(--serif); font-size: 21px; font-style: italic; line-height: 1.7; color: var(--fg); }
.pq-attr { font-family: var(--sans); font-size: 13px; color: var(--fg-3); margin-top: 18px; }
.edition-nav { max-width: 620px; margin: 0 auto; padding: 40px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
.edition-nav-btn { background: none; border: none; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-3); cursor: pointer; transition: color 0.3s; }
.edition-nav-btn:hover { color: var(--accent); }
.edition-nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ── ROLLS INDEX ── */
.editions-index { min-height: 100vh; padding: 140px 40px 80px; max-width: 820px; margin: 0 auto; }
.editions-h { font-family: var(--serif); font-size: clamp(28px, 4vw, 44px); font-weight: 400; color: var(--fg); margin-bottom: 6px; }
.editions-sub { font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--fg-2); margin-bottom: 48px; line-height: 1.6; }
.ed-card { border-bottom: 1px solid var(--border); padding: 28px 0; cursor: pointer; transition: all 0.3s; display: grid; grid-template-columns: 56px 1fr; gap: 20px; align-items: start; }
.ed-card:first-child { border-top: 1px solid var(--border); }
.ed-card:hover { padding-left: 10px; }
.ed-card:hover .ed-card-title { color: var(--accent-deep); }
.ed-card-num { font-family: var(--mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.5px; padding-top: 4px; }
.ed-card-title { font-family: var(--serif); font-size: 22px; font-style: italic; color: var(--fg); transition: color 0.3s; margin-bottom: 4px; }
.ed-card-detail { font-family: var(--sans); font-size: 13px; color: var(--fg-2); }
.ed-card-images { font-family: var(--mono); font-size: 10px; color: var(--fg-3); margin-top: 4px; letter-spacing: 0.5px; }

/* ── ARCHIVE ── */
.archive { min-height: 100vh; padding: 140px 40px 80px; max-width: 820px; margin: 0 auto; }
.archive-h { font-family: var(--serif); font-size: clamp(28px, 4vw, 44px); font-weight: 400; color: var(--fg); margin-bottom: 6px; }
.archive-sub { font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--fg-2); margin-bottom: 16px; }
.archive-count { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-3); margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
.archive-count::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.arc-item { display: block; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.3s; }
.arc-item:first-child { border-top: 1px solid var(--border); }
.arc-item:hover { padding-left: 10px; }
.arc-item:hover .arc-name { color: var(--accent-deep); }
.arc-name { font-family: var(--serif); font-size: 17px; font-style: italic; color: var(--fg); transition: color 0.3s; }
.arc-date { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--fg-3); white-space: nowrap; }

/* ── SINGLE DROP ── */
.single { padding: 140px 40px 80px; max-width: 820px; margin: 0 auto; }
.single-back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-3); background: none; border: none; cursor: pointer; margin-bottom: 48px; transition: color 0.3s; }
.single-back:hover { color: var(--accent); }
.single-date { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.single-title { font-family: var(--serif); font-size: clamp(28px, 5vw, 48px); font-weight: 400; font-style: italic; line-height: 1.15; color: var(--fg); margin-bottom: 40px; }
.single-byline { font-family: var(--sans); font-size: 14px; color: var(--fg-2); padding-top: 24px; border-top: 1px solid var(--border); margin-top: 32px; }

/* ── ABOUT ── */
.about { min-height: 100vh; padding: 140px 40px 80px; max-width: 620px; margin: 0 auto; }
.about-h { font-family: var(--serif); font-size: clamp(28px, 4vw, 44px); font-weight: 400; color: var(--fg); margin-bottom: 44px; }
.about-p { font-family: var(--serif); font-size: 18px; line-height: 1.85; color: var(--fg); margin-bottom: 24px; }
.about-p em { font-style: italic; color: var(--accent-deep); }
.manifesto { padding: 36px 0; margin: 36px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.manifesto-label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--mango); margin-bottom: 24px; }
.m-item { font-family: var(--serif); font-size: 17px; line-height: 1.7; color: var(--fg); margin-bottom: 14px; padding-left: 20px; position: relative; }
.m-item::before { content: '\2014'; position: absolute; left: 0; color: var(--mango); }
.about-section { margin-top: 36px; padding-top: 36px; border-top: 1px solid var(--border); }
.about-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.about-section-body { font-family: var(--serif); font-size: 16px; line-height: 1.85; color: var(--fg-2); }

/* ── NEWSLETTER ── */
.newsletter-bar { max-width: 620px; margin: 60px auto 0; padding: 48px 40px; border-top: 1px solid var(--border); text-align: center; }
.newsletter-label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--mango); margin-bottom: 12px; }
.newsletter-desc { font-family: var(--serif); font-size: 17px; font-style: italic; line-height: 1.65; color: var(--fg-2); margin-bottom: 24px; max-width: 440px; margin-left: auto; margin-right: auto; }
.newsletter-row { display: flex; gap: 0; max-width: 400px; margin: 0 auto; }
.newsletter-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-right: none; background: transparent; font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--fg); outline: none; }
.newsletter-input:focus { border-color: var(--accent); }
.newsletter-input::placeholder { color: var(--fg-3); }
.newsletter-btn { padding: 12px 24px; background: var(--fg); color: var(--bg); border: 1px solid var(--fg); font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
.newsletter-btn:hover { background: var(--accent-deep); border-color: var(--accent-deep); }

/* ── SUBMIT ── */
.submit { min-height: 100vh; padding: 140px 40px 80px; max-width: 620px; margin: 0 auto; }
.submit-h { font-family: var(--serif); font-size: clamp(28px, 4vw, 44px); font-weight: 400; color: var(--fg); margin-bottom: 12px; }
.submit-sub { font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--fg-2); margin-bottom: 44px; line-height: 1.7; }
.submit-invite { padding: 32px; background: var(--bg-deep); margin-bottom: 48px; border-left: 3px solid var(--mango); }
.submit-invite p { font-family: var(--serif); font-size: 17px; font-style: italic; line-height: 1.7; color: var(--fg); }
.form-g { margin-bottom: 28px; }
.form-num { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--accent); opacity: 0.5; margin-bottom: 4px; display: block; }
.form-l { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-2); margin-bottom: 8px; display: block; }
.form-i, .form-ta { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--border); background: transparent; font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--fg); outline: none; transition: border-color 0.3s; }
.form-i:focus, .form-ta:focus { border-bottom-color: var(--accent); }
.form-i::placeholder, .form-ta::placeholder { color: var(--fg-3); }
.form-ta { resize: vertical; min-height: 120px; line-height: 1.6; }
.form-hint { font-family: var(--mono); font-size: 9px; color: var(--fg-3); margin-top: 6px; letter-spacing: 0.5px; }
.submit-btn { display: flex; justify-content: center; padding: 14px 36px; background: var(--fg); color: var(--bg); border: none; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 12px; width: 100%; }
.submit-btn:hover { background: var(--accent-deep); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.form-note { font-family: var(--sans); font-size: 13px; font-weight: 300; color: var(--fg-3); line-height: 1.6; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--border); }
.success-msg { font-family: var(--serif); font-size: clamp(48px, 10vw, 80px); font-style: italic; color: var(--mango); text-align: center; padding: 40px 0 24px; display: none; }
.error-msg { border-left: 3px solid #c44; color: #c44; padding: 12px 16px; font-family: var(--mono); font-size: 12px; margin-bottom: 20px; display: none; }

/* ── VEND ── */
.vend-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(28,26,23,0.94); backdrop-filter: blur(30px); display: none; align-items: center; justify-content: center; padding: 40px; }
.vend-overlay.open { display: flex; animation: vendIn 0.4s cubic-bezier(0.22,1,0.36,1); }
@keyframes vendIn { from { opacity: 0; } to { opacity: 1; } }
.vend-close { position: absolute; top: 24px; right: 32px; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); font-family: var(--mono); font-size: 10px; letter-spacing: 1px; padding: 6px 14px; cursor: pointer; transition: all 0.3s; }
.vend-close:hover { border-color: #fff; color: #fff; }
.vend-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mango); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
.vend-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mango); animation: vdPulse 1.5s ease-in-out infinite; }
@keyframes vdPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.vend-card { max-width: 680px; width: 100%; }
.vend-card .film-wrap { animation: vendDrop 0.5s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
@keyframes vendDrop { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
.vend-info { text-align: center; margin-top: 20px; animation: vendDrop 0.5s cubic-bezier(0.22,1,0.36,1) 0.3s both; }
.vend-info-title { font-family: var(--serif); font-size: 20px; font-style: italic; color: rgba(255,255,255,0.85); margin-bottom: 6px; }
.vend-info-date { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
.vend-again { margin-top: 28px; background: none; border: 1.5px solid var(--mango); color: var(--mango); font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 28px; cursor: pointer; transition: all 0.3s; animation: vendDrop 0.5s cubic-bezier(0.22,1,0.36,1) 0.45s both; }

  else if (name === 'archive') renderArchive();
  else if (name === 'about') renderAbout();

  const el = document.getElementById('page-'+name);

    el.classList.add('active');
    if (!skipScroll) window.scrollTo({ top: 0, behavior: 'instant' });

  }

  window.scrollTo({ top: 0, behavior: 'instant' });
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('entered')));
  setTimeout(observeEditionImages, 100);
}

function showDrop(id) {
  renderDrop(id);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active','entered'));
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('.nav-link[data-page="archive"]');
  if (btn) btn.classList.add('active');
  const el = document.getElementById('page-drop');
  el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('entered')));
}

  });

    imgs2 += '<div class="edition-img-item" style="transition-delay:'+i*0.06+'s">'+filmWrap(img.src, img.caption)+'<div class="edition-img-caption">'+esc(img.caption)+'</div></div>';
  });

  document.getElementById('page-edition').innerHTML = '<div class="edition">'
    +'<div class="edition-header">'
      +'<div class="edition-num">roll '+e.id+'</div>'
      +'<h1 class="edition-title">'+esc(e.title)+'</h1>'

        +'<div class="meta-item"><span class="meta-label">film</span><span class="meta-value">'+esc(e.film)+'</span></div>'

    +'</div>'

// ═══════════════════════════════════════
// FORMSPREE
// ═══════════════════════════════════════

async function submitForm() {
  const title = document.getElementById('sf-title').value.trim();
  const email = document.getElementById('sf-email').value.trim();
  if (!title) { alert('give it a title.'); return; }
  if (!email) { alert('email is required so we can reach you.'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'sending...';
  const fd = new FormData();
  fd.append('title', title);
  fd.append('body', document.getElementById('sf-body').value);
  fd.append('image_url', document.getElementById('sf-img').value);
  fd.append('name', document.getElementById('sf-name').value);
  fd.append('email', document.getElementById('sf-email').value);
  try {
    const res = await fetch('https://formspree.io/f/mkovpozy', {
      method: 'POST', body: fd, headers: { Accept: 'application/json' }
    });
    if (res.ok) {
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      ['sf-title','sf-body','sf-img','sf-name','sf-email'].forEach(id => { document.getElementById(id).value = ''; });
    } else throw new Error();
  } catch {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  btn.disabled = false; btn.textContent = 'submit work';
}

function doVend() {
  const p = ARCHIVE[Math.floor(Math.random() * ARCHIVE.length)];
  document.getElementById('vend-content').innerHTML =
    filmWrap(p.img, p.title)
    +'<div class="vend-info"><div class="vend-info-title">'+esc(p.title)+'</div>'
    +'<div class="vend-info-date">Robert Corrigan</div></div>';
}

function openVend() {
  doVend();
  document.getElementById('vend-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVend() {
  document.getElementById('vend-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('vend-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeVend();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVend(); });

// ═══════════════════════════════════════
// SCROLL OBSERVER (edition images)
// ═══════════════════════════════════════

function observeEditionImages() {
  document.querySelectorAll('.edition-img-item').forEach(el => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('vis'); obs.disconnect(); }
    }, { threshold: 0.1 });
    obs.observe(el);
  });
}
